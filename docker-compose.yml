version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: wiki-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - wiki-network

  wiki-processor:
    build:
      context: ./wiki-processor
      dockerfile: Dockerfile
    container_name: wiki-processor
    ports:
      - "8001:8001"
    environment:
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-dummy-key}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - wiki-network
    command: python main.py

volumes:
  minio_data:

networks:
  wiki-network:
    driver: bridge
