services:
  minio:
    image: minio/minio:latest
    container_name: wiki-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - wiki-network

  wiki-processor:
    build:
      context: ./wiki-processor
      dockerfile: Dockerfile
    container_name: wiki-processor
    ports:
      - "8001:8001"
    environment:
      # LLM provider selection (default: minimax)
      LLM_PROVIDER: ${LLM_PROVIDER:-minimax}
      LLM_API_KEY: ${LLM_API_KEY:-${MINIMAX_API_KEY:-}}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M2.7}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4000}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      MOCK_LLM: ${MOCK_LLM:-true}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wiki-data}
      # mcp-server cache is invalidated after each successful wiki update
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://mcp-server:8002}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - wiki-network
    command: python main.py

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: mcp-server
    ports:
      - "8002:8002"
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wiki-data}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - wiki-network
    command: python http_api/main.py

volumes:
  minio_data:

networks:
  wiki-network:
    driver: bridge
