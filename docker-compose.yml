services:
  minio:
    image: minio/minio:latest
    container_name: wiki-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - wiki-network

  wiki-processor:
    build:
      context: ./wiki-processor
      dockerfile: Dockerfile
    container_name: wiki-processor
    ports:
      - "8001:8001"
    environment:
      # LLM provider selection (default: minimax)
      LLM_PROVIDER: ${LLM_PROVIDER:-minimax}
      LLM_API_KEY: ${LLM_API_KEY:-${MINIMAX_API_KEY:-}}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M2.7}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4000}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      MOCK_LLM: ${MOCK_LLM:-true}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wiki-data}
      # mcp-server cache is invalidated after each successful wiki update
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://mcp-server:8002}
      # /process auth — leave empty for unauthenticated dev mode
      PROCESSOR_API_KEY: ${PROCESSOR_API_KEY:-}
      # PG+pgvector index — on by default (points at the bundled `pg` service).
      # Set PG_DSN= (empty) to disable; the app then falls back to MinIO scans.
      PG_DSN: ${PG_DSN:-postgresql://wiki:wikipass@pg:5432/wiki}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      EMBEDDING_SEND_DIMENSIONS: ${EMBEDDING_SEND_DIMENSIONS:-false}
      MOCK_EMBEDDINGS: ${MOCK_EMBEDDINGS:-true}
    depends_on:
      minio:
        condition: service_healthy
    # No depends_on for pg: the index layer is best-effort; the service must
    # boot and serve even when PG is absent or down (graceful MinIO fallback).
    networks:
      - wiki-network
    command: python main.py

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: mcp-server
    ports:
      - "8002:8002"
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wiki-data}
      # PG+pgvector index — on by default; set PG_DSN= (empty) to disable.
      PG_DSN: ${PG_DSN:-postgresql://wiki:wikipass@pg:5432/wiki}
      PG_RETRY_SECONDS: ${PG_RETRY_SECONDS:-30}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      EMBEDDING_SEND_DIMENSIONS: ${EMBEDDING_SEND_DIMENSIONS:-false}
      MOCK_EMBEDDINGS: ${MOCK_EMBEDDINGS:-true}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - wiki-network
    command: python http_api/main.py

  # ---------------------------------------------------------------------
  # PG+pgvector index (single instance) — part of the default stack, so
  # `docker compose up` brings up Postgres with vector + pg_trgm and the
  # services use it automatically (see PG_DSN defaults above).
  #
  # To run WITHOUT the index:  PG_DSN= docker compose up minio wiki-processor mcp-server
  # (empty PG_DSN disables the layer; the app falls back to MinIO scans.)
  #
  # The app layer only requires "any PG with pgvector + pg_trgm", and
  # already supports multi-host failover DSNs — moving to an HA cluster
  # (repmgr/Patroni/managed PG) later touches only this file and PG_DSN.
  # ---------------------------------------------------------------------
  pg:
    image: pgvector/pgvector:pg16
    container_name: wiki-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-wiki}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-wikipass}
      POSTGRES_DB: ${PG_DATABASE:-wiki}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-wiki} -d ${PG_DATABASE:-wiki}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wiki-network

  # ---------------------------------------------------------------------
  # Optional example upstream app: Oracle Flashback Recovery API
  # (built from sop/oracle-flashback-recovery.md via the sop-to-spec skill).
  # Enable with:  docker compose --profile flashback up -d
  # MOCK_ORACLE=true by default — point ORACLE_DSN at a real instance and
  # set MOCK_ORACLE=false for production use.
  # ---------------------------------------------------------------------
  flashback-api:
    build: ./flashback-api
    container_name: flashback-api
    profiles: ["flashback"]
    ports:
      - "8003:8003"
    environment:
      MOCK_ORACLE: ${MOCK_ORACLE:-true}
      ORACLE_DSN: ${ORACLE_DSN:-}
      ORACLE_USER: ${ORACLE_USER:-}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-}
      FLASHBACK_API_KEY: ${FLASHBACK_API_KEY:-}
      FRA_USAGE_THRESHOLD: ${FRA_USAGE_THRESHOLD:-85}
    networks:
      - wiki-network
    command: python main.py

volumes:
  minio_data:
  pg_data:


networks:
  wiki-network:
    driver: bridge
